{% extends "base.html" %}

{% block content %}

<style>
    body {
        margin: 0;
        padding: 0;
    }

    .home-container {
        height: 100vh;
        display: flex;
    }

    /* Left Side (Content) */
    .left-section {
        width: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #f8f9fa;
        text-align: center;
        padding: 40px;
    }

    .left-section h1 {
        font-size: 40px;
        font-weight: bold;
        margin-bottom: 20px;
    }

    .left-section p {
        color: #6c757d;
        margin-bottom: 30px;
    }

    .btn-custom {
        width: 200px;
        margin: 10px;
    }

    /* Right Side (Image) */
    .right-section {
        width: 50%;
        background: url("{{ url_for('static', filename='stu.png') }}") no-repeat center center/cover;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .home-container {
            flex-direction: column;
        }

        .left-section, .right-section {
            width: 100%;
            height: 50vh;
        }
    }
</style>

<div class="home-container">

    <!-- Left Section -->
    <div class="left-section">
        <h1>🎓 Welcome to Student Result Management System</h1>

        <a href="/login" class="btn btn-primary btn-custom">
            Admin Login
        </a>

        <a href="/search" class="btn btn-success btn-custom">
            Student Login
        </a>
    </div>

    <!-- Right Section (Image) -->
    <div class="right-section"></div>

</div>

{% endblock %}
